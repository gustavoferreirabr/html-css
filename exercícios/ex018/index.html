    <title>Estilos de fontes</title>

    @import url('https://fonts.googleapis.com/css2?family=Solitreo&display=swap');

            font: italic bold 2em 'Solitreo', cursive ;
        }

            font-family: 'Sriracha', cursive;
            font-size: 18px;

            font-style: normal;

        }

</head>

</html>
