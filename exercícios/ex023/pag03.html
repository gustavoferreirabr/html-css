<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
        }
        a{
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: justify;
            font-weight: bold;
            color: rgb(92, 230, 37);
            text-decoration: none;
        }
        a:visited{
            color: brown;
        }
        a:hover{
            text-decoration: underline;
            color: black;
        }
        a:active{
            color: blueviolet;
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>links</h1>
    <ul>
        <li><a href="youtube.com"target="_blank" rel="External">Youtube</a></li>
        <li><a href="facebook.com" target="_blank" rel="External">facebook</a></li>
        <li><a href="twitter.com" target="_blank" rel="Extrernal">twitter</a></li>
    </ul>
</body>
</html>
