<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <H1>Imagens dinamicas</H1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Minus quis sed veritatis reprehenderit, ex placeat a quaerat eum est animi numquam voluptatem! Earum facere fugit, iure dolorum atque accusantium suscipit?</p>
    
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png"> <!--A imagem m, vai aparecer no site até 1050px, a partir disso quem irá assumir o controle será a imagem G-->
        <img src="imagens/foto-g.png" alt="Imagem Flexível"> <!--Imagem padrão do site-->
    </picture>
</body>
</html>
